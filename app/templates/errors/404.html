{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="text-center mt-5">
  <div class="display-1 fw-bold" style="color:var(--nash-primary)">404</div>
  <h4 class="mb-3">Page Not Found</h4>
  <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('public.index') }}" class="btn btn-primary"><i class="bi bi-house me-1"></i> Go Home</a>
</div>
{% endblock %}
