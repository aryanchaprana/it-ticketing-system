# /etc/nginx/sites-available/nash_energy_tickets
# Nash Energy IT Ticketing System — Nginx Reverse Proxy Config

limit_req_zone $binary_remote_addr zone=ticket_submit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=login:10m       rate=10r/m;

server {
    listen 80;

    # Replace with your server's internal IP or hostname
    # e.g. server_name 192.168.1.50;
    # or   server_name it-support.nashenergy.local;
    server_name YOUR_SERVER_IP_OR_HOSTNAME;

    access_log /var/log/nginx/nash_tickets_access.log;
    error_log  /var/log/nginx/nash_tickets_error.log warn;

    # Security Headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin"  always;
    add_header Permissions-Policy     "geolocation=()" always;

    # Upload size limit (must match Flask MAX_CONTENT_LENGTH)
    client_max_body_size 6M;

    # Static files served directly by Nginx (fast)
    location /static/ {
        alias /var/www/nash_energy_tickets/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Protect uploads — block script execution
    location /static/uploads/ {
        alias /var/www/nash_energy_tickets/app/static/uploads/;
        location ~* \.(php|py|pl|sh|cgi)$ {
            deny all;
            return 403;
        }
        expires 1d;
        add_header Cache-Control "private";
    }

    # Rate-limit public ticket submission
    location /submit {
        limit_req zone=ticket_submit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Rate-limit login page
    location /auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other routes → Gunicorn
    location / {
        proxy_pass            http://127.0.0.1:8000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_redirect        off;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
    }

    # Block common attack paths
    location ~* \.(git|env|htaccess|htpasswd|ini|log|sh|sql|bak)$ {
        deny all;
        return 404;
    }
}
